name: Update News in README

on:
  schedule:
    - cron: '0 */12 * * *' # Ejecuta cada 12 horas
  workflow_dispatch: # Permite ejecución manual desde GitHub

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Fetch Latest News and Update README
        run: |
          cat << 'EOF' > update_news.py
          import urllib.request
          import json
          import re
          
          REPO = "PternaSec/news"
          API_URL = f"https://api.github.com/repos/{REPO}/commits"
          
          try:
              req = urllib.request.Request(API_URL)
              req.add_header('User-Agent', 'PternaSec-Bot')
              with urllib.request.urlopen(req) as response:
                  commits = json.loads(response.read())
          
              news_lines = []
              seen_files = set()
              
              for commit in commits:
                  if len(news_lines) >= 3:
                      break
                      
                  sha = commit['sha']
                  date = commit['commit']['author']['date'][:10]
                  
                  # Fetch commit details to see which files were modified
                  detail_req = urllib.request.Request(f"{API_URL}/{sha}")
                  detail_req.add_header('User-Agent', 'PternaSec-Bot')
                  try:
                      with urllib.request.urlopen(detail_req) as detail_res:
                          commit_detail = json.loads(detail_res.read())
                  except Exception:
                      continue
                      
                  files = commit_detail.get('files', [])
                  
                  for file in files:
                      filename = file['filename']
                      # Ignorar el README principal de la raiz, buscar los de las carpetas de noticias
                      if not filename.endswith('.md') or filename == 'README.md':
                          continue
                          
                      if filename in seen_files:
                          continue
                          
                      seen_files.add(filename)
                      
                      # Usamos el mensaje del commit por defecto
                      title = commit['commit']['message'].split('\n')[0]
                      
                      # Intentamos extraer el titulo real (# Titulo) leyendo el archivo Markdown!
                      try:
                          raw_url = f"https://raw.githubusercontent.com/{REPO}/main/{filename}"
                          raw_req = urllib.request.Request(raw_url)
                          raw_req.add_header('User-Agent', 'PternaSec-Bot')
                          with urllib.request.urlopen(raw_req) as raw_res:
                              content = raw_res.read().decode('utf-8')
                              match = re.search(r'^#\s+(.+)', content, re.MULTILINE)
                              if match:
                                  title = match.group(1).strip()
                      except Exception:
                          pass
                          
                      # Link directo al archivo de la noticia (no al commit)
                      file_url = f"https://github.com/{REPO}/blob/main/{filename}"
                      news_lines.append(f"* 📰 **[{date}]** [{title}]({file_url})")
                      break # Solo una noticia por commit
          
              if not news_lines:
                  news_lines = ["* No hay noticias recientes."]
          
              news_content = "\n".join(news_lines)
          
              with open("profile/README.md", "r", encoding="utf-8") as f:
                  readme = f.read()
          
              pattern = r"(<!-- START_SECTION:news -->\n)(.*?)(\n<!-- END_SECTION:news -->)"
              new_readme = re.sub(pattern, r"\g<1>" + news_content + r"\g<3>", readme, flags=re.DOTALL)
          
              with open("profile/README.md", "w", encoding="utf-8") as f:
                  f.write(new_readme)
              
              print("README actualizado con éxito.")
          except Exception as e:
              print(f"Error actualizando noticias: {e}")
          EOF
          python update_news.py
          
      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Automatización: Últimas noticias actualizadas en el README"
          file_pattern: profile/README.md
