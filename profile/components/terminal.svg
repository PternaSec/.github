<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <style>
      .terminal-text {
        font-family: 'Fira Code', 'Courier New', Courier, monospace;
        font-size: 15px;
        fill: #8b5cf6;
      }
      .line {
        opacity: 0;
        animation: showLine 12s infinite;
      }
      .line-1 { animation-delay: 0s; }
      .line-2 { animation-delay: 3s; }
      .line-3 { animation-delay: 6s; }
      .line-4 { animation-delay: 9s; }
      
      @keyframes showLine {
        0%, 95% { opacity: 0; }
        5%, 90% { opacity: 1; }
        100% { opacity: 0; }
      }

      .cursor {
        display: inline-block;
        width: 10px;
        height: 15px;
        background-color: #8b5cf6;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </defs>

  <!-- Window shadow -->
  <rect x="5" y="5" width="590" height="190" rx="10" fill="#000" opacity="0.3" filter="blur(4px)" />

  <!-- Window border and background -->
  <rect x="0" y="0" width="600" height="200" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5" />
  
  <!-- Title bar -->
  <path d="M 0 10 C 0 4.477 4.477 0 10 0 L 590 0 C 595.523 0 600 4.477 600 10 L 600 30 L 0 30 L 0 10 Z" fill="#161b22" />
  <line x1="0" y1="30" x2="600" y2="30" stroke="#30363d" stroke-width="1.5" />
  
  <!-- Window controls -->
  <circle cx="20" cy="15" r="6" fill="#ff5f56" />
  <circle cx="40" cy="15" r="6" fill="#ffbd2e" />
  <circle cx="60" cy="15" r="6" fill="#27c93f" />
  
  <!-- Title text -->
  <text x="300" y="20" font-family="'Fira Code', 'Courier New', Courier, monospace" font-size="12" fill="#8b949e" text-anchor="middle" dominant-baseline="middle">pternasec@core:~</text>

  <!-- Animated Text -->
  <g class="terminal-text" transform="translate(20, 70)">
    <g class="line line-1">
      <text x="0" y="0">&gt; Inicializando PternaSec Core...</text>
      <rect x="290" y="-12" width="10" height="15" fill="#8b5cf6">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
      </rect>
    </g>
    
    <g class="line line-2">
      <text x="0" y="0">&gt; Inicializando PternaSec Core...</text>
      <text x="0" y="30">&gt; Analizando vectores de ataque...</text>
      <rect x="305" y="18" width="10" height="15" fill="#8b5cf6">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
      </rect>
    </g>
    
    <g class="line line-3">
      <text x="0" y="0">&gt; Inicializando PternaSec Core...</text>
      <text x="0" y="30">&gt; Analizando vectores de ataque...</text>
      <text x="0" y="60">&gt; Construyendo sistemas seguros...</text>
      <rect x="305" y="48" width="10" height="15" fill="#8b5cf6">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
      </rect>
    </g>

    <g class="line line-4">
      <text x="0" y="0">&gt; Inicializando PternaSec Core...</text>
      <text x="0" y="30">&gt; Analizando vectores de ataque...</text>
      <text x="0" y="60">&gt; Construyendo sistemas seguros...</text>
      <text x="0" y="90">&gt; Operación completada. [OK]</text>
      <rect x="250" y="78" width="10" height="15" fill="#10b981">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>
</svg>
