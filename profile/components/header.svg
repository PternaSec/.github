<svg width="800" height="250" viewBox="0 0 800 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
    
    .title {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      font-size: 72px;
      fill: #ffffff;
      letter-spacing: -3px;
    }
    .subtitle {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 400;
      font-size: 22px;
      fill: #94a3b8;
      letter-spacing: -0.5px;
    }
    .highlight {
      fill: #0ea5e9;
    }
    /* Glow effect */
    .glow {
      filter: drop-shadow(0 0 15px rgba(14, 165, 233, 0.4));
    }
    
    @media (prefers-color-scheme: light) {
      .title { fill: #0f172a; }
      .subtitle { fill: #64748b; }
      .glow { filter: drop-shadow(0 0 10px rgba(14, 165, 233, 0.3)); }
    }
  </style>
  
  <rect width="800" height="250" fill="transparent"/>
  
  <!-- Content Group -->
  <g transform="translate(110, 60)">
    <!-- Logo based on website's icon.svg, wrapped in glow -->
    <g class="glow" transform="translate(0, 15) scale(1.1)">
      <g stroke="#0ea5e9" stroke-width="6" stroke-linecap="round" fill="none">
        <path d="M 80 35 V 30 A 30 30 0 0 0 20 30 V 70 A 30 30 0 0 0 80 70 V 50" />
        <path d="M 30 45 V 70 A 20 20 0 0 0 70 70 V 55" />
        <path d="M 40 55 V 70 A 10 10 0 0 0 60 70 V 45" />
      </g>
      <g fill="#0ea5e9">
        <circle cx="80" cy="35" r="5" />
        <circle cx="80" cy="50" r="5" />
        <circle cx="30" cy="45" r="5" />
        <circle cx="70" cy="55" r="5" />
        <circle cx="40" cy="55" r="5" />
        <circle cx="60" cy="45" r="5" />
      </g>
      <g fill="#0ea5e9">
        <circle cx="50" cy="57" r="5.5" />
        <path d="M 44.5 75 L 48 57 H 52 L 55.5 75 Z" />
      </g>
    </g>
    
    <!-- Text adapting website typography principles (clean, sans-serif, high contrast) -->
    <text x="130" y="80" class="title">Pterna<tspan class="highlight">Sec</tspan></text>
    <text x="135" y="120" class="subtitle">Investigación Avanzada &amp; Vulnerability Training</text>
  </g>
</svg>
